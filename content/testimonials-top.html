<!--
  מקטע ההמלצות העליון ("dark, teal quotes") — הוסר מ-prototype/index.html בתאריך 19/07/2026
  לבקשת הלקוח, ונשמר כאן לשימוש עתידי אפשרי.

  לשחזור:
   1. העתיקו את בלוק ה-<style> חזרה אל תגית ה-<style> הראשית ב-index.html
      (למשל אחרי כלל ה-.tiles, במקום שבו היה קודם, ליד ההערה "testimonials").
   2. העתיקו את ה-<section> חזרה אל הגוף, מיד לפני <section id="reviews" class="reviews wrap" ...>.

  התוכן (שמוליק / דרור / מיכל) הוא המלצות הלקוחות של פון גת.
-->
<style>
/* ===== testimonials (dark, teal quotes) ===== */
.testi{background:var(--dark);color:#fff;padding:clamp(40px,6vw,80px) 0}
.testi .row{display:grid;grid-template-columns:repeat(3,1fr);gap:2.4rem}
.testi .t{text-align:center}
.testi .qm{color:var(--teal);font-size:2.6rem;font-weight:800;line-height:.6}
.testi .name{color:var(--teal);font-weight:800;margin:.4rem 0 .6rem;font-size:1.15rem}
.testi .txt{color:#d9d9dd;font-size:1.02rem}
@media(max-width:800px){.testi .row{grid-template-columns:1fr;gap:1.8rem}}
</style>

<section id="reviews-top" class="testi" aria-label="המלצות">
  <div class="wrap row">
    <div class="t"><div class="qm" aria-hidden="true">”</div><div class="name">שמוליק</div><p class="txt">יש אנשים שנותנים שירות, ויש שנותנים גם לב, חיוך ותחושה טובה. מקצועיים, אמינים, ובעיקר עומדים בזמן.</p></div>
    <div class="t"><div class="qm" aria-hidden="true">”</div><div class="name">דרור</div><p class="txt">מקצוענות אמיתית. מקום שאתה קונה בו פעם אחת וכבר לא תקנה באף מקום אחר.</p></div>
    <div class="t"><div class="qm" aria-hidden="true">”</div><div class="name">מיכל</div><p class="txt">אתם מיוחדים במינכם. ישרים, אמינים בתיקונים. מקצועיות 10, אנושיות 10, מחירים 10.</p></div>
  </div>
</section>
